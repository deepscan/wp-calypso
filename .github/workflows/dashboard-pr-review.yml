name: Dashboard PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

  pull_request_target:
    types: [opened, ready_for_review]
    paths:
      - 'client/dashboard/**'

concurrency:
  group: dashboard-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo != null &&
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/pr-review.yml
    with:
      prompt_path: .github/prompts/dashboard-pr-review.md
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
---

steps:
  # The desktop build is resource-intensive and this repo runs many builds,
  # so keep it scoped to the same branch families the CircleCI workflow used.
  - label: ":desktop_computer: Build desktop (mac)"
    key: desktop-build-mac
    branches: trunk release/* desktop/* desktop-v*
    notify:
      - github_commit_status:
          context: Desktop / Build (mac)
    agents:
      queue: mac
    env:
      IMAGE_ID: xcode-26.4.1
    plugins:
      - automattic/nvm#0.6.0
    command: .buildkite/commands/build-desktop-mac.sh
    artifact_paths:
      - desktop/release/*.zip
      - desktop/release/*.dmg
      - desktop/release/*.blockmap
      - desktop/release/*.yml
      - desktop/test/e2e/results/**/*

  - label: ":desktop_computer: Build desktop (linux, unsigned)"
    key: desktop-build-linux
    branches: release/* desktop/* desktop-v*
    notify:
      - github_commit_status:
          context: Desktop / Build (linux, unsigned)
    agents:
      queue: default
    plugins:
      - docker#v5.13.0:
          image: cimg/node:24.15.0-browsers
          propagate-uid-gid: true
          userns: host
          environment:
            - BUILDKITE_TAG
            - E2EGUTENBERGUSER
            - E2EPASSWORD
    command: .buildkite/commands/build-desktop-linux.sh
    artifact_paths:
      - desktop/release/*
      - desktop/test/e2e/results/**/*

  - label: ":windows: Build desktop (windows store, unsigned)"
    key: desktop-build-windows-store
    branches: release/* desktop/* desktop-v*
    notify:
      - github_commit_status:
          context: Desktop / Build (windows store, unsigned)
    agents:
      queue: windows
    command: powershell -NoProfile -ExecutionPolicy Bypass -File .buildkite/commands/build-desktop-windows.ps1
    artifact_paths:
      - desktop/release/*.appx

  # Signed NSIS direct-download installer — the auto-update path (electron-
  # updater stays enabled). Signs via Azure Artifact Signing by default, with the
  # org Sectigo PFX as a fallback behind FORCE_PFX_SIGNING (AINFRA-2237).
  - label: ":windows: Build desktop (windows nsis, signed)"
    key: desktop-build-windows-nsis
    branches: release/* desktop/* desktop-v*
    notify:
      - github_commit_status:
          context: Desktop / Build (windows nsis, signed)
    agents:
      queue: windows
    plugins:
      - automattic/a8c-ci-toolkit#6.1.0
    command: powershell -NoProfile -ExecutionPolicy Bypass -File .buildkite/commands/build-desktop-windows-nsis.ps1
    artifact_paths:
      - desktop/release/*.exe
      - desktop/release/*.exe.blockmap
      - desktop/release/latest.yml

  - label: ":desktop_computer: Desktop publish"
    branches: desktop-v*
    depends_on:
      - desktop-build-mac
      - desktop-build-linux
      - desktop-build-windows-store
      - desktop-build-windows-nsis
    notify:
      - github_commit_status:
          context: Desktop / Publish
    agents:
      queue: default
    plugins:
      - automattic/nvm#0.6.0
    command: .buildkite/commands/publish-desktop-release.sh
    artifact_paths:
      - desktop/release/*
      - desktop/CHANGELOG.md
